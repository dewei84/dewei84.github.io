<!DOCTYPE html>
<html lang="en-us">

  {% include head.html %}

  <body>

    <!-- Wrap holds the main page content. -->
    <div class="wrap">
      <div class="masthead">
        <div class="container">
          <h3 class="masthead-title">
            <a href="{{ site.baseurl }}/" title="Home">{{ site.title }}</a>
            <br><small>{{ site.tagline }}</small></br>
          </h3>
        </div>
      </div>

      <div class="container content">
        {{ content }}
      </div>

      <footer class="site-footer">
        <span>&copy; {{ site.time | date: '%Y' }} dewei.sg</span>
      </footer>
    </div>
  </body>
</html>
